title: AI 行业动态存档
description: 记录 AI 的进化历程：每日速递与每周深度综述
theme: minima
markdown: kramdown
collections:
  reports:
    output: true
    permalink: /daily/:year/:month/:day/:slug/
defaults:
  - scope:
      path: "daily"
      type: "reports"
    values:
      layout: news
  - scope:
      path: "weekly"
      type: "reports"
    values:
      layout: news
      permalink: /weekly/:year/:month/:day/:slug/
