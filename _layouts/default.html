<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: white;
            overflow: hidden;
            margin: 0;
            padding: 0;
            color: #1a1a1a;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: none;
            background: white;
            position: relative;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
        }

        .slide-content {
            flex: 1;
            width: 100%;
            height: 100%;
            padding: clamp(2rem, 5vw, 8vh) clamp(1.5rem, 5vw, 10vw);
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        /* 标题页样式 */
        .title-slide {
            text-align: center;
            align-items: center;
        }

        .title-slide h1 {
            font-size: clamp(2rem, 6vw, 8vh);
            color: #000;
            margin-bottom: clamp(1rem, 3vh, 3vh);
            font-weight: 800;
            line-height: 1.2;
        }

        .title-slide .subtitle {
            font-size: clamp(1rem, 2.5vw, 4vh);
            color: #666;
            margin-bottom: clamp(1.5rem, 4vh, 6vh);
            font-weight: 400;
        }

        .title-slide .date {
            font-size: clamp(0.875rem, 2vw, 3vh);
            color: #1a1a1a;
            padding: clamp(0.5rem, 1.5vh, 1.5vh) clamp(1rem, 3vw, 4vw);
            background: #f0f0f0;
            border-radius: 4px;
            display: inline-block;
        }

        /* 内容页样式 */
        .news-slide h2 {
            font-size: clamp(1.5rem, 4vw, 5.5vh);
            color: #000;
            margin-bottom: clamp(1rem, 3vh, 4vh);
            font-weight: 700;
            line-height: 1.3;
            border-left: clamp(6px, 1vw, 12px) solid #000;
            padding-left: clamp(0.75rem, 2vw, 3vw);
        }

        .news-slide .category {
            display: inline-block;
            color: #999;
            font-size: clamp(0.75rem, 1.2vw, 1.6vh);
            margin-bottom: clamp(0.75rem, 1.5vh, 2vh);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5vh;
        }

        .news-slide .highlights h3 {
            font-size: clamp(1rem, 2vw, 3vh);
            color: #444;
            margin-bottom: clamp(0.75rem, 1.5vh, 2vh);
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 8px;
        }

        .news-slide .highlights ul {
            list-style: none;
            padding: 0;
        }

        .news-slide .highlights li {
            font-size: clamp(0.9rem, 2vw, 3vh);
            color: #222;
            line-height: 1.5;
            margin-bottom: clamp(0.5rem, 1.5vh, 2vh);
            padding-left: clamp(1rem, 2.5vw, 3vw);
            position: relative;
        }

        .news-slide .highlights li:before {
            content: "—";
            position: absolute;
            left: 0;
            color: #999;
            transform: translateX(-100%);
            padding-right: 0.5em;
        }

        .news-slide .source {
            margin-top: clamp(1rem, 3vh, 4vh);
            padding-top: clamp(1rem, 2vh, 3vh);
            border-top: 2px solid #eee;
            font-size: clamp(0.75rem, 1.5vw, 2.2vh);
            color: #888;
        }

        /* 辅助信息 */
        .slide-number {
            position: absolute;
            bottom: clamp(1rem, 3vh, 4vh);
            right: clamp(1rem, 3vw, 4vw);
            font-size: clamp(0.75rem, 1.5vw, 1.8vh);
            color: #ccc;
            font-weight: 300;
        }

        .navigation-hint {
            position: absolute;
            bottom: clamp(1rem, 3vh, 4vh);
            left: clamp(1rem, 3vw, 4vw);
            font-size: clamp(0.7rem, 1.2vw, 1.6vh);
            color: #eee;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .slide-content {
                padding: 1.5rem 1.25rem;
            }

            .title-slide h1 {
                font-size: clamp(1.75rem, 7vw, 3rem);
            }

            .title-slide .subtitle {
                font-size: clamp(0.875rem, 3vw, 1.25rem);
            }

            .news-slide h2 {
                font-size: clamp(1.25rem, 4.5vw, 2rem);
                border-left-width: 4px;
                padding-left: 0.75rem;
            }

            .news-slide .highlights li {
                font-size: clamp(0.875rem, 3.5vw, 1.1rem);
                line-height: 1.5;
                padding-left: 1.25rem;
            }

            .news-slide .highlights li:before {
                padding-right: 0.25em;
            }

            .navigation-hint {
                display: none;
            }
        }

        /* 小屏手机适配 */
        @media (max-width: 480px) {
            .slide-content {
                padding: 1rem;
            }

            .title-slide h1 {
                font-size: clamp(1.5rem, 8vw, 2rem);
            }

            .news-slide h2 {
                font-size: clamp(1.1rem, 5vw, 1.5rem);
            }

            .news-slide .highlights li {
                font-size: clamp(0.8rem, 3.8vw, 1rem);
                margin-bottom: 0.75rem;
            }
        }
    </style>
</head>
<body>

    {{ content }}

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        slides.forEach((slide, index) => {
            const pageNum = slide.querySelector('.slide-number');
            if (pageNum) {
                pageNum.textContent = `${index + 1} / ${totalSlides}`;
            }
        });

        function showSlide(n) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (n + totalSlides) % totalSlides;
            slides[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) nextSlide();
            if (touchEndX - touchStartX > 50) prevSlide();
        }, {passive: true});

        document.addEventListener('click', (e) => {
            const clickX = e.clientX;
            const windowWidth = window.innerWidth;
            if (clickX < windowWidth / 3) {
                prevSlide();
            } else if (clickX > windowWidth * 2 / 3) {
                nextSlide();
            }
        });
    </script>
</body>
</html>
