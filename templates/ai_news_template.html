<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI新闻日报 - {{DATE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: white;
            overflow: hidden;
            margin: 0;
            padding: 0;
            color: #1a1a1a;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: none;
            background: white;
            position: relative;
        }

        .slide.active {
            display: flex;
            flex-direction: column;
        }

        .slide-content {
            flex: 1;
            width: 100%;
            height: 100%;
            padding: 8vh 10vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 标题页样式 */
        .title-slide {
            text-align: center;
            align-items: center;
        }

        .title-slide h1 {
            font-size: 8vh;
            color: #000;
            margin-bottom: 3vh;
            font-weight: 800;
        }

        .title-slide .subtitle {
            font-size: 4vh;
            color: #666;
            margin-bottom: 6vh;
            font-weight: 400;
        }

        .title-slide .date {
            font-size: 3vh;
            color: #1a1a1a;
            padding: 1.5vh 4vw;
            background: #f0f0f0;
            border-radius: 4px;
        }

        /* 内容页样式 */
        .news-slide h2 {
            font-size: 5.5vh;
            color: #000;
            margin-bottom: 4vh;
            font-weight: 700;
            line-height: 1.2;
            border-left: 12px solid #000;
            padding-left: 3vw;
        }

        .news-slide .category {
            display: inline-block;
            color: #999;
            font-size: 1.6vh;
            margin-bottom: 2vh;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5vh;
        }

        .news-slide .highlights h3 {
            font-size: 3vh;
            color: #444;
            margin-bottom: 2vh;
            font-weight: 600;
            text-decoration: underline;
            text-underline-offset: 8px;
        }

        .news-slide .highlights ul {
            list-style: none;
            padding: 0;
        }

        .news-slide .highlights li {
            font-size: 3vh;
            color: #222;
            line-height: 1.6;
            margin-bottom: 2vh;
            padding-left: 3vw;
            position: relative;
        }

        .news-slide .highlights li:before {
            content: "—";
            position: absolute;
            left: 0;
            color: #999;
        }

        .news-slide .source {
            margin-top: 4vh;
            padding-top: 3vh;
            border-top: 2px solid #eee;
            font-size: 2.2vh;
            color: #888;
        }

        /* 辅助信息 */
        .slide-number {
            position: absolute;
            bottom: 4vh;
            right: 4vw;
            font-size: 1.8vh;
            color: #ccc;
            font-weight: 300;
        }

        .navigation-hint {
            position: absolute;
            bottom: 4vh;
            left: 4vw;
            font-size: 1.6vh;
            color: #eee;
        }
    </style>
</head>
<body>

    <!-- 封面幻灯片: 请根据需要重复此类结构 -->
    <div class="slide active">
        <div class="slide-content title-slide">
            <h1>🤖 {{MAIN_TITLE}}</h1>
            <div class="subtitle">{{SUBTITLE}}</div>
            <div class="date">{{DATE}}</div>
        </div>
        <div class="navigation-hint">使用 ← → 键或点击屏幕左右翻页</div>
        <div class="slide-number"></div> <!-- 脚本会自动填入页码 -->
    </div>

    <!-- 新闻内容幻灯片模板 -->
    <!-- 
    <div class="slide">
        <div class="slide-content news-slide">
            <span class="category">类别名称</span>
            <h2>这是新闻的主标题</h2>
            <div class="highlights">
                <h3>核心要点</h3>
                <ul>
                    <li>要点1</li>
                    <li>要点2</li>
                    <li>要点3</li>
                </ul>
            </div>
            <div class="source"><strong>来源:</strong> 媒体名称</div>
        </div>
        <div class="slide-number"></div>
    </div>
    -->

    <!-- 这里插入新闻内容 -->

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        // 初始化页码
        slides.forEach((slide, index) => {
            const pageNum = slide.querySelector('.slide-number');
            if (pageNum) {
                pageNum.textContent = `${index + 1} / ${totalSlides}`;
            }
        });

        function showSlide(n) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (n + totalSlides) % totalSlides;
            slides[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // 触摸滑动
        let touchStartX = 0;
        let touchEndX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});
        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) nextSlide();
            if (touchEndX - touchStartX > 50) prevSlide();
        }, {passive: true});

        // 点击翻页 (左1/3上一页, 右1/3下一页)
        document.addEventListener('click', (e) => {
            const clickX = e.clientX;
            const windowWidth = window.innerWidth;
            if (clickX < windowWidth / 3) {
                prevSlide();
            } else if (clickX > windowWidth * 2 / 3) {
                nextSlide();
            }
        });
    </script>
</body>
</html>
